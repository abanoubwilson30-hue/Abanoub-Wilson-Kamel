<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abanoub Wilson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #DAA520;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .top-logo {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 130px; 
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* حاوية العداد والقلب فوق عاليمين */
        .stats-container {
            position: absolute;
            top: 20px;
            right: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            color: #fff;
            font-weight: bold;
        }

        .visit-text {
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        .heart-icon {
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            user-select: none;
            color: #fff;
        }

        .heart-icon.liked {
            color: #ff3040;
            transform: scale(1.2);
        }

        .likes-count {
            font-size: 16px;
            margin-top: -2px;
        }

        .container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            gap: 40px;
            max-width: 95%;
        }

        .profile-pic {
            width: 320px;
            height: 400px;
            border-radius: 25px;
            border: 6px solid #fff;
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .links-area {
            width: 400px;
        }

        h2 { 
            color: #39FF14 !important; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
            font-size: 28px;
            margin-bottom: 15px;
            text-align: left;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .icon {
            width: 38px;
            height: 38px;
            margin-right: 12px;
        }

        .btn {
            flex: 1;
            background: #fff;
            border: 2.5px solid #004494;
            color: #004494;
            text-decoration: none;
            padding: 8px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 17px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #004494;
            color: #fff;
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            body { overflow: hidden; }
            .container { 
                flex-direction: column;
                gap: 15px;
                margin-top: 50px;
            }
            .profile-pic { 
                width: 160px;
                height: 200px; 
            }
            .links-area { width: 320px; }
            h2 { font-size: 22px; text-align: center; }
            .stats-container { top: 10px; right: 15px; }
            .top-logo { width: 80px; }
        }
    </style>
</head>
<body>

    <img src="logo.jpeg" alt="Logo" class="top-logo">

    <div class="stats-container">
        <div class="visit-text">الزيارات: <span id="visit-count">...</span></div>
        <div id="heart" class="heart-icon">❤</div>
        <div class="likes-count" id="like-count">...</div>
    </div>

    <div class="container">
        <img src="photo.jpg" alt="Abanoub" class="profile-pic">

        <div class="links-area">
            <h2>Abanoub Wilson Kamel 👨🏻‍💻</h2>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="icon" alt="WhatsApp">
                <a href="https://wa.me/201207382544" class="btn" target="_blank">WhatsApp</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="icon" alt="Telegram">
                <a href="https://t.me/+201207382544" class="btn" target="_blank">Telegram</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="icon" alt="Facebook">
                <a href="https://www.facebook.com/share/18H7TR9iZD/" class="btn" target="_blank">Facebook</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="icon" alt="Instagram">
                <a href="https://www.instagram.com/abo_malk5444?igsh=M3ppNnA5ZjJwemV1" class="btn" target="_blank">Instagram</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Threads_%28app%29_logo.svg" class="icon" alt="Threads">
                <a href="https://www.threads.com/@abo_malk5444" class="btn" target="_blank">Threads</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="icon" alt="TikTok">
                <a href="https://www.tiktok.com/@abomalk07382544" class="btn" target="_blank">TikTok</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/en/c/c4/Snapchat_logo.svg" class="icon" alt="Snapchat">
                <a href="https://www.snapchat.com/add/abomalk3825" class="btn" target="_blank">Snapchat</a>
            </div>

            <div class="item">
                <img src="https://img.icons8.com/fluent/48/000000/mail.png" alt="Sarhne" class="icon">
                <a href="https://3496549215590.sarhne.com" class="btn" target="_blank">Sarhne</a>
            </div>
        </div>
    </div>

    <script>
        // مفاتيح فريدة لموقعك عشان العداد ميتلخبطش مع حد تاني
        const namespace = "abanoub_wilson_unique_99"; 

        // دالة لجلب البيانات وزيادتها
        async function updateStats(key, elementId, increment = true) {
            const action = increment ? 'hit' : 'get';
            try {
                const response = await fetch(`https://api.countapi.xyz/${action}/${namespace}/${key}`);
                const data = await response.json();
                document.getElementById(elementId).innerText = data.value;
            } catch (error) {
                console.error("Error updating " + key);
                document.getElementById(elementId).innerText = "0";
            }
        }

        // عند تحميل الصفحة: زود الزيارات وهات اللايكات
        window.onload = () => {
            updateStats('visits', 'visit-count', true); // يزود 1 تلقائي
            updateStats('likes', 'like-count', false);  // يجيب الرقم بس بدون زيادة
            
            // لو المستخدم ده عامل لايك قبل كدة يفضل القلب أحمر (محلياً)
            if(localStorage.getItem('is_liked') === 'true') {
                document.getElementById('heart').classList.add('liked');
            }
        };

        // عند الضغط على القلب
        document.getElementById('heart').onclick = async function() {
            const heart = this;
            if(!heart.classList.contains('liked')) {
                // زيادة اللايك في السيرفر عند الكل
                await updateStats('likes', 'like-count', true);
                heart.classList.add('liked');
                localStorage.setItem('is_liked', 'true');
            } else {
                // تنقيص اللايك (اختياري، هنا هنخليه ثابت أو ينقص)
                // ملحوظة: الـ API المجاني مش بيدعم النقص بسهولة، فهنكتفي بالزيادة فقط لمنع التلاعب
                alert("شكراً على دعمك!");
            }
        };
    </script>

</body>
</html>
