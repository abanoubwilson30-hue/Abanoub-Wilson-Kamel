<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abanoub Wilson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #808080; /* ده اللون الرمادي الأساسي */
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

        /* اللوجو الكبير الثابت */
        .top-logo {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 130px; 
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            gap: 40px;
            max-width: 95%;
        }

        .profile-pic {
            width: 320px;
            height: 400px;
            border-radius: 25px;
            border: 6px solid #fff;
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .links-area {
            width: 400px;
        }

        h2 { 
            color: #39FF14 !important; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
            font-size: 28px;
            margin-bottom: 15px;
            text-align: left;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 8px; /* تقليل المسافة بين اللينكات */
        }

        .icon {
            width: 38px;
            height: 38px;
            margin-right: 12px;
        }

        .btn {
            flex: 1;
            background: #fff;
            border: 2.5px solid #004494; /* تصغير سمك البرواز */
            color: #004494;
            text-decoration: none;
            padding: 8px; /* تصغير حجم الزرار */
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 17px; /* تصغير الخط شوية */
            transition: 0.3s;
        }

        .btn:hover {
            background: #004494;
            color: #fff;
            transform: scale(1.02);
        }

        /* تعديلات الموبايل - لإظهار كل شيء بدون سكرول */
        @media (max-width: 768px) {
            body { 
                overflow: hidden; /* منع السكرول في الموبايل أيضاً */
            }
            .container { 
                flex-direction: column; /* الصورة فوق واللينكات تحت */
                gap: 15px;
                margin-top: 50px; /* مسافة للوجو */
            }
            .profile-pic { 
                width: 160px; /* تصغير الصورة في الموبايل */
                height: 200px; 
                margin-top: 0;
            }
            .links-area { 
                width: 320px; /* عرض مناسب للموبايل */
            }
            h2 { 
                font-size: 22px; 
                text-align: center; 
                margin-bottom: 10px;
            }
            .item { 
                margin-bottom: 6px; 
            }
            .btn { 
                padding: 6px; 
                font-size: 15px; 
            }
            .icon { 
                width: 32px; 
                height: 32px; 
            }
            .top-logo { 
                width: 80px; /* تصغير اللوجو في الموبايل */
            }
        }
    </style>
</head>
<body>

    <img src="logo.jpeg" alt="Logo" class="top-logo">

    <div class="container">
        
        <img src="photo.jpg" alt="Abanoub" class="profile-pic">

        <div class="links-area">
            <h2>Abanoub Wilson Kamel 👨🏻‍💻</h2>

            </div>

            <div class="item">

                <a href="https://www.facebook.com/share/18H7TR9iZD/" class="btn" target="_blank">Facebook</a>

</body>
</html>
