<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abanoub Wilson</title>
    <style>
        /* Reset margins and padding to ensure a single-page view */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #DAA520; /* Gold color */
            height: 100vh; /* Exactly the screen height */
            width: 100vw;
            overflow: hidden; /* Prevent scrolling */
            display: flex;
            align-items: center; /* Vertical centering */
            justify-content: center; /* Horizontal centering */
            position: relative;
        }

        /* Large logo in the top-left corner */
        .top-logo {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 160px; /* Large size as requested */
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .container {
            display: flex;
            flex-direction: row; /* Image on left, links on right for English layout */
            align-items: center;
            gap: 50px;
            max-width: 95%;
        }

        /* Profile picture styling */
        .profile-pic {
            width: 340px;
            height: 420px;
            border-radius: 25px;
            border: 6px solid #fff;
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            margin-top: 30px; 
        }

        .links-area {
            width: 420px;
        }

        h2 {
            color: #fff;
            font-size: 30px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
            text-align: left;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 10px; 
        }

        .icon {
            width: 42px;
            height: 42px;
            margin-right: 15px; /* Margin to the right for English alignment */
        }

        .btn {
            flex: 1;
            background: #fff;
            border: 3px solid #004494;
            color: #004494;
            text-decoration: none;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 19px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #004494;
            color: #fff;
            transform: scale(1.02);
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; padding-top: 100px; }
            .container { flex-direction: column; }
            .profile-pic { width: 200px; height: 250px; }
            .top-logo { width: 100px; }
        }
        h2 { color: #39FF14 !important; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <img src="logo.jpeg" alt="Logo" class="top-logo">

    <div class="container">
        
        <img src="photo.jpg" alt="Abanoub" class="profile-pic">

        <div class="links-area">
            <h2> Abanoub Wilson Kamel 👨🏻‍💻</h2>

                <a href="https://wa.me/201207382544" class="btn" target="_blank">WhatsApp</a>
            </div>

            <div class="item">

                <a href="https://t.me/+201207382544" class="btn" target="_blank">Telegram</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="icon" alt="Facebook">
                <a href="https://www.facebook.com/share/18H7TR9iZD/" class="btn" target="_blank">Facebook</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="icon" alt="Instagram">
                <a href="https://www.instagram.com/abo_malk5444?igsh=M3ppNnA5ZjJwemV1" class="btn" target="_blank">Instagram</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Threads_%28app%29_logo.svg" class="icon" alt="Threads">
                <a href="https://www.threads.com/@abo_malk5444" class="btn" target="_blank">Threads</a>
            </div>

            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="icon" alt="TikTok">

            <div class="item">

        </div>
    </div>

</body>
</html>
