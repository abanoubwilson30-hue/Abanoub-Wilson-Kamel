<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abanoub Wilson</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #DAA520;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px 0;
            overflow-x: hidden;
        }

        .top-logo {
            position: absolute; top: 10px; left: 10px;
            width: 130px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100;
        }

        .stats-container {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 100; color: #fff; font-weight: bold;
        }

        .visit-text { font-size: 16px; margin-bottom: 5px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        .heart-icon { font-size: 35px; cursor: pointer; transition: transform 0.2; user-select: none; color: #fff; }
        .heart-icon.liked { color: #ff3040; transform: scale(1.2); }
        .likes-count { font-size: 18px; margin-top: -5px; }

        .container {
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; width: 90%; max-width: 400px; margin-top: 60px;
        }

        .profile-pic {
            width: 220px; height: 280px; border-radius: 25px;
            border: 6px solid #fff; object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h2 { color: #39FF14 !important; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); font-size: 26px; text-align: center; }

        .links-area { width: 100%; }
        .item { display: flex; align-items: center; margin-bottom: 12px; width: 100%; }
        .icon { width: 35px; height: 35px; margin-right: 12px; }
        .btn {
            flex: 1; background: #fff; border: 2.5px solid #004494;
            color: #004494; text-decoration: none; padding: 10px;
            border-radius: 12px; text-align: center; font-weight: bold;
            font-size: 17px; transition: 0.3s;
        }
        .btn:hover { background: #004494; color: #fff; }
    </style>
</head>
<body>

    <img src="logo.jpeg" alt="Logo" class="top-logo">

    <div class="stats-container">
        <div class="visit-text">الزيارات: <span id="visit-count">0</span></div>
        <div id="heart" class="heart-icon">❤</div>
        <div class="likes-count" id="like-count">0</div>
    </div>

    <div class="container">
        <img src="photo.jpg" alt="Abanoub" class="profile-pic">
        <h2>Abanoub Wilson Kamel 👨🏻‍💻</h2>
        <div class="links-area">
            <div class="item"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="icon"><a href="https://wa.me/201207382544" class="btn" target="_blank">WhatsApp</a></div>
            <div class="item"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="icon"><a href="https://t.me/+201207382544" class="btn" target="_blank">Telegram</a></div>
            <div class="item"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="icon"><a href="https://www.facebook.com/share/18H7TR9iZD/" class="btn" target="_blank">Facebook</a></div>
            <div class="item"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="icon"><a href="https://www.instagram.com/abo_malk5444?igsh=M3ppNnA5ZjJwemV1" class="btn" target="_blank">Instagram</a></div>
            <div class="item"><img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Threads_%28app%29_logo.svg" class="icon"><a href="https://www.threads.com/@abo_malk5444" class="btn" target="_blank">Threads</a></div>
            <div class="item"><img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="icon"><a href="https://www.tiktok.com/@abomalk07382544" class="btn" target="_blank">TikTok</a></div>
            <div class="item"><img src="https://upload.wikimedia.org/wikipedia/en/c/c4/Snapchat_logo.svg" class="icon"><a href="https://www.snapchat.com/add/abomalk3825" class="btn" target="_blank">Snapchat</a></div>
            <div class="item"><img src="https://img.icons8.com/fluent/48/000000/mail.png" class="icon"><a href="https://3496549215590.sarhne.com" class="btn" target="_blank">Sarhne</a></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // بياناتك من الصورة
        const firebaseConfig = {
            apiKey: "AIzaSyAtjI0pu042JDGrrZbYAdTwwJuAxvuzpKI",
            authDomain: "abanoub-wilson.firebaseapp.com",
            databaseURL: "https://abanoub-wilson-default-rtdb.firebaseio.com",
            projectId: "abanoub-wilson",
            storageBucket: "abanoub-wilson.firebasestorage.app",
            messagingSenderId: "576569777620",
            appId: "1:576569777620:web:24888d1b095914ba2d4a41"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const visitsRef = ref(db, 'stats/visits');
        const likesRef = ref(db, 'stats/likes');

        // زيادة الزيارات عند كل ريفريش
        runTransaction(visitsRef, (current) => (current || 0) + 1);

        // عرض الأرقام لايف
        onValue(visitsRef, (snap) => document.getElementById('visit-count').innerText = snap.val() || 0);
        onValue(likesRef, (snap) => document.getElementById('like-count').innerText = snap.val() || 0);

        // نظام اللايكات
        const heart = document.getElementById('heart');
        heart.onclick = () => {
            if (!heart.classList.contains('liked')) {
                heart.classList.add('liked');
                runTransaction(likesRef, (curr) => (curr || 0) + 1);
                localStorage.setItem('liked', 'true');
            }
        };
        if (localStorage.getItem('liked')) heart.classList.add('liked');
    </script>
</body>
</html>
