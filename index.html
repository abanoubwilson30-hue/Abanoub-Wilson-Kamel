<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abanoub Wilson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #DAA520;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px 0;
        }

        .top-logo {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 130px; 
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* حاوية العداد والقلب */
        .stats-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            color: #fff;
            font-weight: bold;
        }

        .visit-text {
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        .heart-icon {
            font-size: 35px;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
            color: #fff;
        }

        .heart-icon.liked {
            color: #ff3040;
            transform: scale(1.1);
        }

        .likes-count {
            font-size: 16px;
            margin-top: -5px;
        }

        .container {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 20px;
            width: 90%;
            max-width: 400px;
            margin-top: 60px;
        }

        .profile-pic {
            width: 220px;
            height: 280px;
            border-radius: 25px;
            border: 6px solid #fff;
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h2 { 
            color: #39FF14 !important; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); 
            font-size: 24px;
            text-align: center;
        }

        .links-area {
            width: 100%;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .icon {
            width: 35px;
            height: 35px;
            margin-right: 10px;
        }

        .btn {
            flex: 1;
            background: #fff;
            border: 2px solid #004494;
            color: #004494;
            text-decoration: none;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #004494;
            color: #fff;
        }

        @media (max-width: 768px) {
            .top-logo { width: 80px; }
            .profile-pic { width: 180px; height: 230px; }
        }
    </style>
</head>
<body>

    <img src="logo.jpeg" alt="Logo" class="top-logo">

    <div class="stats-container">
        <div class="visit-text">الزيارات: 
            <img src="https://hitwebcounter.com/counter/counter.php?page=abanoubwilson_v3&style=0006&nbdigits=1&type=page&initCount=55" title="Free Counter" Alt="web counter" border="0" style="vertical-align: middle; height: 20px;">
        </div>
        
        <div id="heart" class="heart-icon">❤</div>
        <div class="likes-count" id="like-count">0</div>
    </div>

    <div class="container">
        <img src="photo.jpg" alt="Abanoub" class="profile-pic">
        <h2>Abanoub Wilson Kamel 👨🏻‍💻</h2>

        <div class="links-area">
            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="icon">
                <a href="https://wa.me/201207382544" class="btn" target="_blank">WhatsApp</a>
            </div>
            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="icon">
                <a href="https://t.me/+201207382544" class="btn" target="_blank">Telegram</a>
            </div>
            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="icon">
                <a href="https://www.facebook.com/share/18H7TR9iZD/" class="btn" target="_blank">Facebook</a>
            </div>
            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="icon">
                <a href="https://www.instagram.com/abo_malk5444?igsh=M3ppNnA5ZjJwemV1" class="btn" target="_blank">Instagram</a>
            </div>
            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Threads_%28app%29_logo.svg" class="icon">
                <a href="https://www.threads.com/@abo_malk5444" class="btn" target="_blank">Threads</a>
            </div>
            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="icon">
                <a href="https://www.tiktok.com/@abomalk07382544" class="btn" target="_blank">TikTok</a>
            </div>
            <div class="item">
                <img src="https://upload.wikimedia.org/wikipedia/en/c/c4/Snapchat_logo.svg" class="icon">
                <a href="https://www.snapchat.com/add/abomalk3825" class="btn" target="_blank">Snapchat</a>
            </div>
            <div class="item">
                <img src="https://img.icons8.com/fluent/48/000000/mail.png" class="icon">
                <a href="https://3496549215590.sarhne.com" class="btn" target="_blank">Sarhne</a>
            </div>
        </div>
    </div>

    <script>
        // نظام اللايكات باستخدام API خارجي بسيط جداً ومضمون
        const heart = document.getElementById('heart');
        const likeText = document.getElementById('like-count');
        
        // دي قاعدة بيانات مصغرة أونلاين خاصة بموقعك
        const apiURL = "https://api.countapi.xyz/hit/abanoub-wilson-likes/key1";

        async function getLikes() {
            try {
                // هنجيب العدد الفعلي من السيرفر
                const res = await fetch("https://api.countapi.xyz/get/abanoub-wilson-likes/key1");
                const data = await res.json();
                likeText.innerText = data.value || 0;
            } catch (e) {
                likeText.innerText = "5"; // رقم احتياطي لو السيرفر هنج
            }
        }

        heart.onclick = async function() {
            if(!heart.classList.contains('liked')) {
                heart.classList.add('liked');
                // نبعت زيادة للسيرفر
                const res = await fetch(apiURL);
                const data = await res.json();
                likeText.innerText = data.value;
                localStorage.setItem('liked_abanoub', 'true');
            }
        };

        // تشغيل عند البداية
        if(localStorage.getItem('liked_abanoub') === 'true') heart.classList.add('liked');
        getLikes();
    </script>

</body>
</html>
